<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sims Clone</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2301696f'/%3E%3Ccircle cx='32' cy='24' r='12' fill='%23f5cba7'/%3E%3Cpath d='M18 54c2-12 8-18 14-18s12 6 14 18z' fill='%234fc3f7'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0e0d0b;
      font-family:'Segoe UI',system-ui,sans-serif; }
    #canvas-container { position:fixed; inset:0; }

    /* ── Toolbar ────────────────────────────────────────────── */
    #toolbar {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      display:flex; align-items:center; gap:8px; padding:7px 14px;
      background:rgba(14,13,11,0.92); backdrop-filter:blur(10px);
      border-top:1px solid rgba(255,255,255,0.07);
    }
    #toolbar button {
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
      color:#ccc; border-radius:6px; padding:4px 10px; cursor:pointer;
      font-size:12px; transition:background .15s;
    }
    #toolbar button:hover  { background:rgba(255,255,255,0.15); }
    #toolbar button.active { background:#01696f; color:#fff; border-color:#01696f; }
    .tb-sep { width:1px; height:18px; background:rgba(255,255,255,0.1); margin:0 2px; }
    #clock  { margin-left:auto; font-size:12px; font-weight:600; color:#ffd580; min-width:60px; text-align:right; }

    /* ── Needs panel (top-right) ────────────────────────────── */
    #needs-panel {
      position:fixed; top:16px; right:16px; z-index:50;
      background:rgba(14,13,11,0.85); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.08); border-radius:10px;
      padding:12px 15px; min-width:185px;
    }
    #needs-panel h3 { color:#eee; font-size:11px; margin-bottom:4px;
      text-transform:uppercase; letter-spacing:.08em; }
    #sim-mood   { font-size:13px; margin-bottom:2px; }
    #sim-traits { color:#666; font-size:10px; margin-bottom:6px; font-style:italic; }
    #sim-status {
      font-size:10px; color:#ffd580; margin-bottom:8px;
      min-height:14px; letter-spacing:.02em;
    }
    #sim-missing {
      font-size:10px; color:#ef9a9a; margin-bottom:8px;
      min-height:14px;
    }
    .need-row  { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
    .need-label { color:#999; font-size:11px; width:56px; text-align:right; }
    .need-bar-bg { flex:1; height:5px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
    .need-bar-fill { height:100%; border-radius:999px; transition:width .4s,background .4s; }

    /* ── Sim portraits (top-left) ───────────────────────────── */
    #sim-selector { position:fixed; top:16px; left:16px; z-index:50; display:flex; gap:8px; }
    .sim-portrait {
      width:38px; height:38px; border-radius:50%; border:2px solid;
      cursor:pointer; font-size:11px; font-weight:700; color:#fff;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:1px; transition:transform .15s;
    }
    .sim-portrait:hover { transform:scale(1.12); }
    .sim-mood-dot { font-size:10px; }

    /* ── Story log ──────────────────────────────────────────── */
    #story-panel {
      position:fixed; top:62px; left:16px; z-index:50;
      width:230px;
      background:rgba(14,13,11,0.82); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.08); border-radius:10px;
      padding:10px 12px;
      display:flex; flex-direction:column;
      max-height:calc(100vh - 110px);
    }
    #story-panel.hidden { display:none; }
    #story-panel-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:8px;
    }
    #story-panel-header h3 {
      color:#eee; font-size:11px;
      text-transform:uppercase; letter-spacing:.08em;
    }
    #btn-story-close {
      background:none; border:none; color:#555; font-size:13px;
      cursor:pointer; padding:0 2px; line-height:1;
    }
    #btn-story-close:hover { color:#aaa; }
    #story-log {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:3px;
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
    }
    .log-entry { display:flex; align-items:flex-start; gap:6px; font-size:10px; }
    .log-dot   { flex-shrink:0; width:6px; height:6px; border-radius:50%; margin-top:3px; }
    .log-time  { color:#444; min-width:40px; flex-shrink:0; }
    .log-text  { color:#bbb; line-height:1.4; }
    .cat-drama    .log-text { color:#ef9a9a; }
    .cat-positive .log-text { color:#a5d6a7; }
    .cat-mood     .log-text { color:#ffd54f; }
    .cat-gossip   .log-text { color:#ce93d8; }
    .cat-action   .log-text { color:#80cbc4; }
    .cat-need     .log-text { color:#ffcc80; }

    /* ── Relations panel ─────────────────────────────────────── */
    #rel-panel {
      display:none; position:fixed; bottom:48px; right:16px; z-index:50;
      background:rgba(14,13,11,0.88); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.08); border-radius:10px;
      padding:12px 15px; min-width:200px;
    }
    #rel-panel h3 { color:#eee; font-size:11px; margin-bottom:8px;
      text-transform:uppercase; letter-spacing:.08em; }
    .rel-row  { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
    .rel-name { color:#ccc; font-size:11px; width:52px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rel-bar-wrap { flex:1; height:5px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
    .rel-bar  { height:100%; border-radius:999px; transition:width .4s; }
    .rel-label { font-size:10px; width:50px; text-align:right; }
    .rel-score { font-size:10px; color:#555; width:28px; text-align:right; }
    .rel-empty { color:#666; font-size:11px; }

    /* ── Build panel ─────────────────────────────────────────── */
    #build-panel {
      display:none; position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
      z-index:60; background:rgba(14,13,11,0.92); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      padding:11px 14px; max-width:90vw;
    }
    #build-panel p { color:#888; font-size:11px; margin-bottom:7px; }
    #build-catalog { display:flex; gap:6px; flex-wrap:wrap; max-height:120px; overflow-y:auto; }
    .catalog-item {
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
      color:#ccc; border-radius:6px; padding:4px 9px; cursor:pointer;
      font-size:11px; display:flex; align-items:center; gap:5px; transition:background .15s;
    }
    .catalog-item:hover  { background:rgba(255,255,255,0.14); }
    .catalog-item.active { border-color:#01696f; color:#fff; }
    .ci-swatch { display:inline-block; width:9px; height:9px; border-radius:2px; flex-shrink:0; }
    .ci-social { font-size:9px; color:#ffd54f; margin-left:2px; }

    /* ── God panel ───────────────────────────────────────────── */
    #god-panel {
      display:none; position:fixed; bottom:48px; left:16px; z-index:60;
      width:210px; background:rgba(14,13,11,0.92); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      padding:12px 14px;
    }
    #god-panel h3 { color:#eee; font-size:11px; margin-bottom:8px;
      text-transform:uppercase; letter-spacing:.08em; }
    #god-panel label { display:block; color:#777; font-size:10px; margin:8px 0 4px; }
    #god-panel select {
      width:100%; background:rgba(255,255,255,0.07); color:#ddd;
      border:1px solid rgba(255,255,255,0.12); border-radius:6px;
      padding:5px 7px; font-size:11px;
    }
    #god-panel button {
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
      color:#ddd; border-radius:6px; padding:5px 8px; cursor:pointer;
      font-size:11px;
    }
    #god-panel button:hover { background:rgba(255,255,255,0.15); }
    .god-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px; }
    .god-target { color:#ffd580; font-size:12px; font-weight:700; }

    /* ── Graph panel ─────────────────────────────────────────── */
    #graph-panel {
      display:none; position:fixed; bottom:48px; left:238px; z-index:60;
      width:260px; background:rgba(14,13,11,0.92); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      padding:12px 14px;
    }
    #graph-panel h3 { color:#eee; font-size:11px; margin-bottom:8px;
      text-transform:uppercase; letter-spacing:.08em; }
    .graph-svg {
      width:100%; height:150px; display:block;
      background:rgba(255,255,255,0.035); border-radius:8px;
      border:1px solid rgba(255,255,255,0.06);
    }
    .graph-svg text { fill:#fff; font-size:8px; font-weight:700; pointer-events:none; }
    .graph-legend { display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; margin:8px 0; }
    .graph-legend span { color:#888; font-size:10px; display:flex; align-items:center; gap:5px; }
    .graph-legend i { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .graph-list { display:flex; flex-direction:column; gap:4px; max-height:130px; overflow:auto; }
    .graph-row { display:grid; grid-template-columns:52px 1fr 28px; align-items:center; gap:6px; font-size:10px; }
    .graph-type { font-weight:700; }
    .graph-names { color:#bbb; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .graph-score { color:#777; text-align:right; }
    .graph-empty { color:#666; font-size:11px; }

    /* ── Speech bubbles ──────────────────────────────────────── */
    #bubbles { position:fixed; inset:0; pointer-events:none; z-index:30; }
    .bubble {
      position:absolute; background:rgba(20,19,17,0.92);
      border:1px solid rgba(255,255,255,0.13); border-radius:8px;
      padding:3px 8px; font-size:11px; color:#eee;
      transform:translate(-50%,-100%);
      transition:opacity .3s; opacity:0;
      white-space:nowrap; pointer-events:none;
    }

    /* ── Hint ────────────────────────────────────────────────── */
    #hint {
      position:fixed; bottom:44px; left:50%; transform:translateX(-50%);
      z-index:45; font-size:11px; color:rgba(255,255,255,0.3);
      pointer-events:none; white-space:nowrap;
    }

    /* ── Drama toast ─────────────────────────────────────────── */
    #drama-toast {
      position:fixed; top:70px; left:50%; transform:translateX(-50%);
      z-index:70; pointer-events:none;
    }
    .toast {
      background:rgba(239,83,80,0.18); border:1px solid rgba(239,83,80,0.4);
      color:#ef9a9a; border-radius:8px; padding:6px 14px;
      font-size:12px; text-align:center; margin-bottom:6px;
      animation:toastIn .3s ease, toastOut .4s ease 2.8s forwards;
    }
    .toast.positive { background:rgba(102,187,106,0.15); border-color:rgba(102,187,106,0.35); color:#a5d6a7; }
    .toast.mood     { background:rgba(255,213,79,0.12);  border-color:rgba(255,213,79,0.3);   color:#ffd54f; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    @keyframes toastOut { to  {opacity:0;transform:translateY(-8px)} }

    /* ── Lifecycle toast (Sprint 3) ──────────────────────────── */
    /*
     * #lifecycle-toast  — fixed column on the bottom-left, above toolbar.
     * Each .lc-toast slides in from the left and fades out.
     * Categories: lc-stage | lc-promote | lc-fire | lc-skill | lc-schedule
     */
    #lifecycle-toast {
      position:fixed;
      bottom:52px;        /* just above toolbar */
      left:16px;
      z-index:65;
      display:flex;
      flex-direction:column-reverse; /* newest on top */
      gap:5px;
      pointer-events:none;
      max-width:320px;
    }

    .lc-toast {
      display:flex;
      align-items:center;
      gap:8px;
      padding:7px 13px;
      border-radius:8px;
      font-size:12px;
      line-height:1.4;
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(8px);
      /* default: neutral */
      background:rgba(30,28,25,0.92);
      color:#ccc;
      animation: lcToastIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
    }
    .lc-toast.lc-toast--out {
      animation: lcToastOut 0.4s ease forwards;
    }

    /* category colours */
    .lc-toast.lc-stage   { background:rgba(79,152,163,0.18); border-color:rgba(79,152,163,0.4); color:#80cbc4; }
    .lc-toast.lc-promote { background:rgba(255,213,79,0.14); border-color:rgba(255,213,79,0.35); color:#ffd54f; }
    .lc-toast.lc-fire    { background:rgba(239,83,80,0.16);  border-color:rgba(239,83,80,0.38);  color:#ef9a9a; }
    .lc-toast.lc-skill   { background:rgba(165,214,167,0.14);border-color:rgba(165,214,167,0.35);color:#a5d6a7; }
    .lc-toast.lc-schedule{ background:rgba(206,147,216,0.13);border-color:rgba(206,147,216,0.3); color:#ce93d8; }

    @keyframes lcToastIn {
      from { opacity:0; transform:translateX(-18px); }
      to   { opacity:1; transform:none; }
    }
    @keyframes lcToastOut {
      to   { opacity:0; transform:translateX(-10px); }
    }

    /* Life Cycle panel ──────────────────────────────────────── */
    #lifecycle-panel {
      display:none;
      position:fixed; bottom:48px; right:220px; z-index:60;
      width:240px;
      background:rgba(14,13,11,0.92); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1); border-radius:10px;
      padding:12px 14px;
      color:#ccc;
      font-size:12px;
    }
    .lc-stage-badge {
      display:flex; align-items:center; gap:7px;
      margin-bottom:10px;
    }
    .lc-stage-dot {
      width:10px; height:10px; border-radius:50%; flex-shrink:0;
    }
    .lc-stage-name  { font-weight:700; font-size:13px; color:#eee; }
    .lc-stage-age   { font-size:10px; color:#666; margin-left:auto; }
    .lc-career-row  { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .lc-career-name { color:#ffd580; font-weight:600; }
    .lc-career-lvl  { color:#888; font-size:11px; }
    .lc-simoleons   { color:#a5d6a7; font-size:11px; }
    .lc-at-work     { font-size:10px; color:#80cbc4; margin-bottom:8px; }
    .lc-skills      { margin-bottom:10px; }
    .lc-skill-row   { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .lc-skill-lbl   { color:#777; font-size:10px; width:68px; text-align:right; }
    .lc-skill-bar-bg{ flex:1; height:4px; background:rgba(255,255,255,0.07); border-radius:999px; overflow:hidden; }
    .lc-skill-bar   { height:100%; border-radius:999px; background:#4f98a3; transition:width .4s; }
    .lc-skill-val   { color:#555; font-size:10px; width:22px; text-align:right; }
    .lc-career-select-row { margin-bottom:10px; }
    .lc-career-select-row label { display:block; color:#555; font-size:10px; margin-bottom:4px; }
    #lc-career-select {
      width:100%; background:rgba(255,255,255,0.06); color:#ddd;
      border:1px solid rgba(255,255,255,0.1); border-radius:6px;
      padding:4px 7px; font-size:11px;
    }
    .lc-req-warn { color:#ef9a9a; font-size:10px; margin-top:3px; }
    .lc-timeline-wrap { margin-top:4px; }
    .lc-timeline-wrap label { color:#555; font-size:10px; display:block; margin-bottom:4px; }
    .lc-timeline {
      display:flex; gap:1px; height:14px;
    }
    .lc-tick {
      flex:1; border-radius:2px;
      background:rgba(255,255,255,0.06);
    }
    .lc-tick.t-sleep    { background:rgba(79,152,163,0.45); }
    .lc-tick.t-eat      { background:rgba(255,213,79,0.45); }
    .lc-tick.t-fun      { background:rgba(206,147,216,0.45); }
    .lc-tick.t-social   { background:rgba(165,214,167,0.45); }
    .lc-tick.t-study    { background:rgba(255,183,77,0.45); }
    .lc-tick.t-work     { background:rgba(239,83,80,0.4); }
    .lc-tick.t-now      { outline:2px solid #4f98a3; outline-offset:-1px; }
    .lc-timeline-labels {
      display:flex; justify-content:space-between;
      color:#444; font-size:9px; margin-top:2px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="sim-selector"></div>
  <div id="bubbles"></div>
  <div id="drama-toast"></div>
  <div id="lifecycle-toast"></div>

  <!-- Needs panel -->
  <div id="needs-panel">
    <h3 id="sim-name">Sim</h3>
    <div id="sim-mood"></div>
    <div id="sim-traits"></div>
    <div id="sim-status"></div>
    <div id="sim-missing"></div>
    <div id="needs-bars"></div>
  </div>

  <!-- Story log -->
  <div id="story-panel">
    <div id="story-panel-header">
      <h3>📖 Story</h3>
      <button id="btn-story-close" title="Close log">✕</button>
    </div>
    <div id="story-log"></div>
  </div>

  <div id="rel-panel"></div>
  <div id="god-panel"></div>
  <div id="graph-panel"></div>

  <div id="build-panel">
    <p>Select an object then click a tile to place it. ✦ = social</p>
    <div id="build-catalog"></div>
  </div>

  <div id="hint">Left-click: move / select &nbsp;|&nbsp; Right-click: actions</div>

  <div id="toolbar">
    <button id="btn-pause">⏸ Pause</button>
    <div class="tb-sep"></div>
    <button id="btn-1x" class="active">1×</button>
    <button id="btn-2x">2×</button>
    <button id="btn-5x">5×</button>
    <div class="tb-sep"></div>
    <button id="btn-story">📖 Story</button>
    <button id="btn-rel">♥ Relations</button>
    <button id="btn-graph">🕸 Graph</button>
    <button id="btn-god">⚡ God</button>
    <button id="btn-build">🔨 Build</button>
    <button id="btn-lifecycle">📋 Life</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
    <span id="speed-label" style="color:#555;font-size:12px">Speed: 1×</span>
    <span id="clock">9:00 AM</span>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
