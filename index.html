<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sims Clone — Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111827; font-family: Inter, system-ui, sans-serif; color: #f3f4f6; }
  #game-container { position: absolute; inset: 0; z-index: 1; }
  #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
  #ui-layer > * { pointer-events: auto; }
  .panel {
    background: rgba(17,24,39,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
    backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  #top-hud {
    position: absolute; top: 16px; left: 16px; right: 16px; display: grid; grid-template-columns: 1fr auto; gap: 16px;
  }
  #summary { display: flex; gap: 12px; padding: 12px 16px; align-items: center; }
  .metric { display: flex; flex-direction: column; min-width: 90px; }
  .metric .label { font-size: 11px; color: #9ca3af; text-transform: uppercase; }
  .metric .value { font-size: 20px; font-weight: 700; }
  #sim-list { width: 320px; padding: 12px; }
  #sim-list h3, #needs-panel h3, #log-panel h3 { margin-bottom: 10px; font-size: 13px; letter-spacing: .03em; color: #fff; }
  #sim-roster { display: grid; gap: 8px; }
  .roster-item {
    display: flex; justify-content: space-between; align-items: center; width: 100%;
    background: rgba(255,255,255,0.04); border: 1px solid transparent; color: #e5e7eb; padding: 10px 12px; border-radius: 10px;
    cursor: pointer;
  }
  .roster-item.active { border-color: #34d399; background: rgba(52,211,153,0.15); }
  #needs-panel {
    position: absolute; top: 120px; right: 16px; width: 290px; padding: 16px;
  }
  .need-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .need-label { width: 74px; text-transform: capitalize; font-size: 12px; }
  .need-bar { flex: 1; height: 10px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
  .need-fill { height: 100%; border-radius: 999px; transition: width 0.2s; }
  .need-value { width: 30px; text-align: right; font-size: 12px; }
  #controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; padding: 8px 12px;
  }
  button, .file-label {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 9px 14px;
    border-radius: 8px; cursor: pointer; font-size: 12px;
  }
  button:hover, .file-label:hover { background: rgba(255,255,255,0.16); }
  #file-load { display: none; }
  #log-panel {
    position: absolute; bottom: 16px; left: 16px; width: 420px; max-height: 210px; padding: 12px; overflow-y: auto;
  }
  .log-entry { margin-bottom: 4px; font-size: 11px; color: #d1d5db; }
  .log-time { color: #6b7280; margin-right: 6px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="game-container"></div>
<div id="ui-layer">
  <div id="top-hud">
    <div id="summary" class="panel">
      <div class="metric"><span class="label">Ora</span><span class="value" id="hud-clock">08:00</span></div>
      <div class="metric"><span class="label">Popolazione</span><span class="value" id="hud-population">0</span></div>
      <div class="metric"><span class="label">Media needs</span><span class="value" id="hud-average">0</span></div>
    </div>
    <div id="sim-list" class="panel">
      <h3>Roster Sims</h3>
      <div id="sim-roster"></div>
    </div>
  </div>

  <div id="needs-panel" class="panel">
    <h3>Bisogni</h3>
    <div id="needs-content">Nessun Sim selezionato</div>
  </div>

  <div id="controls" class="panel">
    <button id="btn-spawn">Spawn Sim</button>
    <button id="btn-pause">Pausa</button>
    <button id="btn-speed">1x</button>
    <button id="btn-save">Save</button>
    <label class="file-label" for="file-load">Load</label>
    <input id="file-load" type="file" accept="application/json">
  </div>

  <div id="log-panel" class="panel">
    <h3>Event Log</h3>
    <div class="log-entry"><span class="log-time">[00:00]</span>Avvio prototipo...</div>
  </div>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
