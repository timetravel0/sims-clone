<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sims Clone</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2301696f'/%3E%3Ccircle cx='32' cy='24' r='12' fill='%23f5cba7'/%3E%3Cpath d='M18 54c2-12 8-18 14-18s12 6 14 18z' fill='%234fc3f7'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/toolbar.css" />
  <link rel="stylesheet" href="/src/styles/panels.css" />
  <link rel="stylesheet" href="/src/styles/build-mode.css" />
  <link rel="stylesheet" href="/src/styles/sim-creator.css" />
  <link rel="stylesheet" href="/src/styles/start-menu.css" />
  <link rel="stylesheet" href="/src/styles/dashboard.css" />
</head>
<body>
  <div id="canvas-container"></div>
  <div id="sim-selector"></div>
  <div id="bubbles"></div>
  <div id="drama-toast"></div>
  <div id="lifecycle-toast"></div>

  <!-- Needs panel -->
  <div id="needs-panel">
    <h3 id="sim-name">Sim</h3>
    <div id="sim-mood"></div>
    <div id="sim-traits"></div>
    <div id="sim-status"></div>
    <div id="sim-missing"></div>
    <div id="needs-bars"></div>
  </div>

  <!-- Story log -->
  <div id="story-panel">
    <div id="story-panel-header">
      <h3>📖 Story</h3>
      <button id="btn-story-close" title="Close log">✕</button>
    </div>
    <div id="story-log"></div>
  </div>

  <div id="rel-panel"></div>
  <div id="god-panel"></div>
  <div id="graph-panel"></div>
  <div id="skill-panel"></div>
  <div id="save-slot-panel"></div>
  <div id="sim-creator"></div>
  <div id="start-menu"></div>
  <div id="experiment-panel"></div>

  <div id="build-panel">
    <div id="build-tools">
      <button class="bt-tool active" data-tool="furniture">🪑 Furniture</button>
      <button class="bt-tool" data-tool="wall">🧱 Wall</button>
      <button class="bt-tool" data-tool="door">🚪 Door</button>
      <button class="bt-tool" data-tool="eraser">🧹 Erase</button>
      <button class="bt-tool" data-tool="move">✋ Move</button>
      <button id="bt-rooms">🏠 Rooms</button>
      <button id="btn-expand-lot" class="bt-tool">🏗️ Espandi §1500</button>
      <span id="bt-funds">§20,000</span>
    </div>
    <p>Furniture: pick an item then click a tile. Wall/Door: click two adjacent tiles. ✦ = social</p>
    <div id="build-catalog"></div>
  </div>
  <canvas id="room-overlay"></canvas>

  <div id="hint">Left-click: move / select &nbsp;|&nbsp; Right-click: actions</div>

  <div id="toolbar">
    <button id="btn-pause">⏸ Pause</button>
    <div class="tb-sep"></div>
    <button id="btn-1x" class="active">1×</button>
    <button id="btn-3x">3×</button>
    <button id="btn-5x">5×</button>
    <div class="tb-sep"></div>
    <button id="btn-story">📖 Story</button>
    <button id="btn-rel">♥ Relations</button>
    <button id="btn-graph">🕸 Graph</button>
    <button id="btn-god">⚡ God</button>
    <button id="btn-build">🔨 Build</button>
    <button id="btn-lifecycle">📋 Life</button>
    <button id="btn-skills">⚙ Skills</button>
    <button id="btn-party">🎉 Party</button>
    <button id="btn-lab">🧪 Lab</button>
    <button id="btn-export-log">📋 Log</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
    <span id="speed-label" style="color:#555;font-size:12px">Speed: 1×</span>
    <span id="clock">9:00 AM</span>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
