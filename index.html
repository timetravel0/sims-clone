<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sims Clone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0d0b;
      font-family: 'Segoe UI', system-ui, sans-serif; }
    #canvas-container { position: fixed; inset: 0; }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      background: rgba(14,13,11,0.88);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    #toolbar button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: #ccc; border-radius: 6px; padding: 4px 11px; cursor: pointer;
      font-size: 12px; transition: background 0.15s;
    }
    #toolbar button:hover  { background: rgba(255,255,255,0.15); }
    #toolbar button.active { background: #01696f; color: #fff; border-color: #01696f; }
    .tb-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }
    #clock { margin-left: auto; font-size: 12px; font-weight: 600; color: #ffd580;
             min-width: 64px; text-align: right; }

    /* ── Needs panel (right) ── */
    #needs-panel {
      position: fixed; top: 16px; right: 16px; z-index: 50;
      background: rgba(14,13,11,0.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 12px 16px; min-width: 190px;
    }
    #needs-panel h3 { color: #eee; font-size: 11px; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.08em; }
    .need-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .need-label { color: #999; font-size: 11px; width: 58px; text-align: right; }
    .need-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.08);
      border-radius: 999px; overflow: hidden; }
    .need-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s, background 0.4s; }

    /* ── Sim selector (top-left) ── */
    #sim-selector {
      position: fixed; top: 16px; left: 16px; z-index: 50;
      display: flex; gap: 8px;
    }
    .sim-portrait {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      font-size: 13px; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .sim-portrait:hover { transform: scale(1.12); }

    /* ── Build panel ── */
    #build-panel {
      display: none;
      position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
      z-index: 60;
      background: rgba(14,13,11,0.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px 16px;
    }
    #build-panel p { color: #999; font-size: 11px; margin-bottom: 8px; }
    #build-catalog { display: flex; gap: 8px; flex-wrap: wrap; }
    .catalog-item {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: #ccc; border-radius: 6px; padding: 5px 10px; cursor: pointer;
      font-size: 12px; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .catalog-item:hover  { background: rgba(255,255,255,0.14); }
    .catalog-item.active { border-color: #01696f; color: #fff; }
    .ci-swatch { display: inline-block; width: 10px; height: 10px;
      border-radius: 2px; flex-shrink: 0; }

    /* ── Log ── */
    #log {
      position: fixed; bottom: 52px; left: 16px; z-index: 40;
      pointer-events: none; display: flex; flex-direction: column-reverse; gap: 2px;
    }
    #log div { font-size: 10px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- Sim portraits -->
  <div id="sim-selector"></div>

  <!-- Needs panel -->
  <div id="needs-panel">
    <h3 id="sim-name">Sim</h3>
    <div id="needs-bars"></div>
  </div>

  <!-- Build catalog -->
  <div id="build-panel">
    <p>Click a tile to place</p>
    <div id="build-catalog"></div>
  </div>

  <!-- Log -->
  <div id="log"></div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-pause">⏸ Pause</button>
    <div class="tb-sep"></div>
    <button id="btn-1x" class="active">1×</button>
    <button id="btn-2x">2×</button>
    <button id="btn-5x">5×</button>
    <div class="tb-sep"></div>
    <button id="btn-build">🔨 Build</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
    <span id="speed-label" style="color:#666;font-size:12px">Speed: 1×</span>
    <span id="clock">9:00 AM</span>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
